name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structural:
    name: Structural + Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e tools/indexer
      - name: Pytest
        run: python -m pytest tests/ tools/indexer/tests/ -v

  rust-search:
    name: Rust search (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: tools/search
      - name: Build
        working-directory: tools/search
        run: cargo build --release
      - name: Test
        working-directory: tools/search
        run: cargo test --release

  odin-templates:
    name: Odin templates (${{ matrix.os }} / odin ${{ matrix.odin }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        odin: [dev-2026-04, nightly]
        include:
          - odin: nightly
            continue-on-error: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error == true }}
    steps:
      - uses: actions/checkout@v4
      - uses: laytan/setup-odin@v2
        with:
          release: ${{ matrix.odin }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scaffold + build game template
        shell: bash
        run: |
          python -m pip install -e tools/indexer
          mkdir -p content && echo "[]" > content/manifest.yaml
          odin-master new gametest --template game --target /tmp/gametest
          cd /tmp/gametest
          odin build src -file:src/main_release.odin -define:HOT_RELOAD=false -out:gametest

  odin-instrument:
    name: instrument (-define:INSTRUMENT=${{ matrix.flavor }})
    strategy:
      fail-fast: false
      matrix:
        flavor: ["false", "spall"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: laytan/setup-odin@v2
        with:
          release: dev-2026-04
      - name: Build instrument package
        run: odin build tools/odin_lib/instrument -define:INSTRUMENT=${{ matrix.flavor }} -build-mode:obj -out:/tmp/instr.o

  integration:
    name: bootstrap-lite + doctor (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: laytan/setup-odin@v2
        with:
          release: dev-2026-04
      - name: Install indexer + run doctor
        run: |
          python -m pip install -e tools/indexer
          mkdir -p content && echo "[]" > content/manifest.yaml
          odin-master doctor || true
