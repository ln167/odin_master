name: docs

on:
  push:
    branches: [main]
    paths: ["docs/**", "templates/**", "tools/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e tools/indexer
      - name: docs build
        run: python -m odin_master docs build
      - name: Upload docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: |
            docs/
            build/docs/
