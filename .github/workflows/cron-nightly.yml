name: nightly-odin

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  templates-on-nightly:
    name: Templates on nightly Odin (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: laytan/setup-odin@v2
        with:
          release: nightly
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scaffold + build
        shell: bash
        run: |
          python -m pip install -e tools/indexer
          mkdir -p content && echo "[]" > content/manifest.yaml
          odin-master new gametest --template game --target /tmp/gametest
          cd /tmp/gametest
          odin build src -file:src/main_release.odin -define:HOT_RELOAD=false -out:gametest
