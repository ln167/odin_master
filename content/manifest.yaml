# odin_master default corpus — spec §4.7.
# Add new sources by following docs/adding-sources.md, then `odin-master update`.
#
# DO NOT INDEX — out of license / out of license-equivalent:
#   - Discord transcripts (Odin server)
#   - Private support emails
#   - Anything paywalled

# ── Tier 1: authoritative ────────────────────────────────────────────────────
- id: odin-lang-org
  tier: 1
  fetcher: html_mirror
  url: https://odin-lang.org/docs/
  destination: odin-lang-org
  processor: html-to-markdown
  mirror: true
  max_depth: 4
  max_pages: 200
  last_updated: 2026-04-19

- id: odin-pkg-docs
  tier: 1
  fetcher: html_mirror
  url: https://pkg.odin-lang.org/
  destination: odin-pkg-docs
  processor: html-to-markdown
  mirror: true
  max_depth: 3
  max_pages: 400
  last_updated: 2026-04-19

- id: odin-overview
  tier: 1
  fetcher: pasted_text
  destination: odin-overview
  source_path: tier1-authoritative/odin-overview
  processor: markdown
  last_updated: 2026-04-19

- id: odin-core
  tier: 1
  fetcher: local_dir
  source_path: ${ODIN_ROOT}/core
  destination: odin-core
  processor: source-code
  include_glob: "**/*.odin"
  max_files: 4000
  max_bytes_per_file: 524288
  last_updated: 2026-04-19

- id: odin-vendor
  tier: 1
  fetcher: local_dir
  source_path: ${ODIN_ROOT}/vendor
  destination: odin-vendor
  processor: source-code
  include_glob: "**/*.odin"
  max_files: 4000
  max_bytes_per_file: 524288
  last_updated: 2026-04-19

- id: odin-wiki
  tier: 1
  fetcher: local_dir
  source_path: content/wiki/concepts
  destination: odin-wiki
  processor: markdown
  include_glob: "**/*.md"
  last_updated: 2026-04-19

# ── Tier 2: curated ──────────────────────────────────────────────────────────
- id: karl-zylinski-blog
  tier: 2
  fetcher: html_mirror
  url: https://zylinski.se/posts/
  destination: karl-zylinski
  processor: html-to-markdown
  mirror: true
  max_depth: 2
  max_pages: 30
  last_updated: 2026-04-19

- id: gingerbill-blog
  tier: 2
  fetcher: html_mirror
  url: https://www.gingerbill.org/article/
  destination: gingerbill
  processor: html-to-markdown
  mirror: true
  max_depth: 2
  max_pages: 30
  last_updated: 2026-04-19

- id: jakubtomsu-blog
  tier: 2
  fetcher: html_mirror
  url: https://jakubtomsu.github.io/
  destination: jakubtomsu
  processor: html-to-markdown
  mirror: true
  max_depth: 2
  max_pages: 30
  last_updated: 2026-04-19

# ── Tier 3: community (treat with skepticism) ────────────────────────────────
- id: odin-examples
  tier: 3
  fetcher: git_clone
  git_url: https://github.com/odin-lang/examples.git
  destination: odin-examples
  processor: source-code
  last_updated: 2026-04-19
