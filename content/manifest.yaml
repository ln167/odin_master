- id: tinyrenderer
  tier: 1
  domain: graphics
  fetcher: html_mirror
  url: https://github.com/ssloy/tinyrenderer/wiki
  destination: tinyrenderer
  processor: html-to-markdown
  mirror: true
  max_depth: 2
  max_pages: 30
  last_updated: 2026-05-09
  notes: |
    Sokolov's CPU-rasterizer curriculum. Spine of graphics lessons
    00 through 09 (framebuffer through tangent-space normal mapping).
    Skip lesson 9 (GLSL); keep lessons 0-6bis plus the
    perspective-correct interpolation supplement.

- id: vkguide-dev
  tier: 1
  domain: graphics
  fetcher: html_mirror
  url: https://vkguide.dev/
  destination: vkguide
  processor: html-to-markdown
  mirror: true
  max_depth: 4
  max_pages: 100
  last_updated: 2026-05-09
  notes: |
    Vulkan tutorial with the cleanest GPU-driven-rendering section
    available (bindless via descriptor indexing + BDA, indirect draw,
    compute culling). Maps to graphics lessons 13-15. Vulkan-specific
    code, but the techniques port to SDL3-GPU one-to-one.

- id: jonathanfischer-sdl-gpu
  tier: 1
  domain: graphics
  fetcher: html_mirror
  url: https://www.jonathanfischer.net/gpu-by-example/
  destination: jonathanfischer-sdl-gpu
  processor: html-to-markdown
  mirror: true
  max_depth: 3
  max_pages: 30
  last_updated: 2026-05-09
  notes: |
    "Muddling through SDL GPU" by Jonathan Fischer. Closest thing to
    a curriculum-grade SDL3-GPU walkthrough. Source for graphics
    lessons 10-12 (device + swapchain + render pass + first triangle,
    vertex/fragment shaders, push constants).

- id: matthias-research-tenminutephysics
  tier: 1
  domain: graphics
  fetcher: html_mirror
  url: https://matthias-research.github.io/pages/tenMinutePhysics/
  destination: tenminutephysics
  processor: html-to-markdown
  mirror: true
  max_depth: 2
  max_pages: 50
  last_updated: 2026-05-09
  notes: |
    Matthias Mueller's "Ten Minute Physics" series. Includes the XPBD
    PDF (09-xpbd.pdf) plus implementations of Verlet, soft body,
    fluid, rigid body. Spine of graphics lesson 18 (XPBD substep
    loop, then port to compute).

