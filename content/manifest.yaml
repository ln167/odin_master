# odin_master substrate corpus.
# Add new sources by following docs/adding-sources.md.
# Note: the v1 update fetcher pipeline is deferred — manifest is data-only for now.
#
# DO NOT INDEX — out of license / out of license-equivalent:
#   - Discord transcripts (Odin server)
#   - Private support emails
#   - Anything paywalled

# ── Tier 1: authoritative ────────────────────────────────────────────────────
- id: odin-lang-org
  tier: 1
  domain: odin
  fetcher: html_mirror
  url: https://odin-lang.org/docs/
  destination: odin-lang-org
  processor: html-to-markdown
  mirror: true
  max_depth: 4
  max_pages: 200
  last_updated: 2026-04-19

- id: odin-pkg-docs
  tier: 1
  domain: odin
  fetcher: html_mirror
  url: https://pkg.odin-lang.org/
  destination: odin-pkg-docs
  processor: html-to-markdown
  mirror: true
  max_depth: 3
  max_pages: 400
  last_updated: 2026-04-19

- id: odin-overview
  tier: 1
  domain: odin
  fetcher: pasted_text
  destination: odin-overview
  source_path: content/domains/odin/source/raw/tier1-authoritative/odin-overview
  processor: markdown
  last_updated: 2026-04-19

- id: odin-core
  tier: 1
  domain: odin
  fetcher: local_dir
  source_path: ${ODIN_ROOT}/core
  destination: odin-core
  processor: source-code
  include_glob: "**/*.odin"
  max_files: 4000
  max_bytes_per_file: 524288
  last_updated: 2026-04-19

- id: odin-vendor
  tier: 1
  domain: odin
  fetcher: local_dir
  source_path: ${ODIN_ROOT}/vendor
  destination: odin-vendor
  processor: source-code
  include_glob: "**/*.odin"
  max_files: 4000
  max_bytes_per_file: 524288
  last_updated: 2026-04-19

# (odin-wiki entry removed — wiki was archived to content/_archive/old-wiki-concepts
